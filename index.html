<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <script>
    (function () {
      try {
        var raw = localStorage.getItem('campusify_data');
        if (!raw) return;
        var data = JSON.parse(raw);
        var theme = data.settings && data.settings.theme;
        if (theme === 'dark' || theme === 'light') {
          document.documentElement.setAttribute('data-theme', theme);
        }
      } catch (e) {}
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Campusify — Dasbor akademik lengkap untuk mahasiswa">
  <meta name="theme-color" content="#6366f1">
  <title>Campusify — Dasbor Akademik</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div id="splash" class="splash" role="status" aria-live="polite" aria-label="Memuat Campusify">
    <div class="splash__inner">
      <div class="splash__logo">
        <svg class="splash__icon" viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <rect width="48" height="48" rx="12" fill="url(#splashGrad)"/>
          <path d="M24 12L36 20V34H28V26H20V34H12V20L24 12Z" fill="white" fill-opacity="0.95"/>
          <defs>
            <linearGradient id="splashGrad" x1="0" y1="0" x2="48" y2="48">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="splash__title">Campusify</h1>
      <p class="splash__subtitle">Pusat kendali akademik Anda</p>
      <div class="splash__loader" aria-hidden="true">
        <div class="splash__loader-bar"></div>
      </div>
    </div>
  </div>

  <div id="app" class="app hidden" aria-hidden="true">
    <div id="sidebar-overlay" class="sidebar-overlay" aria-hidden="true"></div>

    <aside id="sidebar" class="sidebar" role="navigation" aria-label="Navigasi utama">
      <div class="sidebar__header">
        <a href="#dashboard" class="sidebar__brand" data-nav="dashboard">
          <svg class="sidebar__brand-icon" viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <rect width="32" height="32" rx="8" fill="url(#brandGrad)"/>
            <path d="M16 8L24 13.5V23H19V17H13V23H8V13.5L16 8Z" fill="white"/>
            <defs>
              <linearGradient id="brandGrad" x1="0" y1="0" x2="32" y2="32">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="sidebar__brand-text">Campusify</span>
        </a>
        <button id="sidebar-close" class="sidebar__close btn-icon mobile-only" aria-label="Tutup navigasi">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <nav class="sidebar__nav">
        <ul class="sidebar__menu" role="list">
          <li><a href="#dashboard" class="sidebar__link active" data-nav="dashboard">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            <span>Beranda</span>
          </a></li>
          <li><a href="#grades" class="sidebar__link" data-nav="grades">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 1.1 2.7 2 6 2s6-.9 6-2v-5"/></svg>
            <span>Nilai</span>
          </a></li>
          <li><a href="#schedule" class="sidebar__link" data-nav="schedule">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            <span>Jadwal</span>
          </a></li>
          <li><a href="#assignments" class="sidebar__link" data-nav="assignments">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
            <span>Tugas</span>
          </a></li>
          <li><a href="#finance" class="sidebar__link" data-nav="finance">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
            <span>Keuangan</span>
          </a></li>
          <li><a href="#attendance" class="sidebar__link" data-nav="attendance">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
            <span>Kehadiran</span>
          </a></li>
          <li><a href="#goals" class="sidebar__link" data-nav="goals">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            <span>Target</span>
          </a></li>
        </ul>
      </nav>

      <div class="sidebar__footer">
        <a href="#settings" class="sidebar__user" data-nav="settings" aria-label="Buka pengaturan profil" title="Buka Pengaturan">
          <div class="sidebar__avatar" id="sidebar-avatar" aria-hidden="true">M</div>
          <div class="sidebar__user-info">
            <span class="sidebar__user-name" id="sidebar-user-name">Mahasiswa</span>
            <span class="sidebar__user-semester" id="sidebar-user-semester">Semester 1</span>
          </div>
          <svg class="sidebar__user-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
        </a>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="topbar" role="banner">
        <button id="sidebar-toggle" class="topbar__menu btn-icon mobile-only" aria-label="Buka navigasi" aria-expanded="false" aria-controls="sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>
        <div class="topbar__search">
          <svg class="topbar__search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="search" id="global-search" class="topbar__search-input" placeholder="Cari mata kuliah, tugas..." aria-label="Pencarian global">
        </div>
        <div class="topbar__actions">
          <button id="theme-toggle" class="btn-icon topbar__action" aria-label="Ganti mode gelap">
            <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
            <svg class="icon-moon hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
            </svg>
          </button>
          <div class="notification-wrapper">
            <button id="notification-btn" class="btn-icon topbar__action" aria-label="Notifikasi" aria-expanded="false" aria-haspopup="true" aria-controls="notification-panel">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/>
              </svg>
              <span id="notification-badge" class="notification-badge hidden" aria-label="Notifikasi belum dibaca">0</span>
            </button>
            <div id="notification-panel" class="notification-panel hidden" role="dialog" aria-label="Notifikasi">
              <div class="notification-panel__header">
                <h3>Notifikasi</h3>
                <button id="mark-all-read" class="btn-text">Tandai semua dibaca</button>
              </div>
              <div id="notification-list" class="notification-panel__list" role="list"></div>
            </div>
          </div>
        </div>
      </header>

      <main id="main-content" class="main-content" role="main">
        <div id="page-container"></div>
      </main>
    </div>
  </div>

  <div id="modal-root"></div>
  <div id="toast-container" class="toast-container" role="status" aria-live="polite"></div>

  <script>
    (function () {
      if (location.protocol === 'file:') {
        document.addEventListener('DOMContentLoaded', function () {
          var splash = document.getElementById('splash');
          if (!splash) return;
          splash.innerHTML =
            '<div class="splash__inner" style="max-width:420px;padding:0 24px">' +
            '<h1 class="splash__title">Perlu server lokal</h1>' +
            '<p style="color:var(--text-muted);margin:16px 0 24px;line-height:1.6">' +
            'Campusify memakai ES modules yang diblokir browser saat membuka <code>index.html</code> langsung dari disk.' +
            '</p>' +
            '<p style="color:var(--text-secondary);font-size:14px">Jalankan di folder ini:<br><strong>npx serve .</strong><br>Lalu buka <strong>http://localhost:3000</strong></p>' +
            '</div>';
        });
        return;
      }

      setTimeout(function () {
        var splash = document.getElementById('splash');
        var app = document.getElementById('app');
        if (splash && app && app.classList.contains('hidden')) {
          splash.classList.add('fade-out');
          app.classList.remove('hidden');
          app.removeAttribute('aria-hidden');
          setTimeout(function () { splash.remove(); }, 400);
        }
      }, 5000);
    })();
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
